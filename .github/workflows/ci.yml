name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore PostWallAPI.slnx

      - name: Build
        run: dotnet build PostWallAPI.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test PostWallAPI.slnx --no-build --configuration Release --verbosity normal

  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore PostWallAPI.slnx

      - name: Check formatting
        run: dotnet format PostWallAPI.slnx --verify-no-changes --verbosity diagnostic
